    <title>PDF压缩神器 - 想多大就多大 | 免费在线PDF压缩工具</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="canonical" href="https://example.com/" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <span class="eyebrow">PDF Compression Skill</span>
      </header>

      <section class="hero">
        <h1>想多大就多大<br />PDF一键压缩神器</h1>
        <p class="lead">
          仅支持电脑网页版、单个 PDF 文件。保持页数、页面尺寸和版式不变，优先保留图片和文字清晰度。
        </p>
      </section>

      <section class="panel">
        <div class="config-row" id="config-bar"></div>

        <form id="compress-form" class="form" novalidate>
          <label class="dropzone" id="dropzone" for="pdf">
            <input id="pdf" name="pdf" type="file" accept="application/pdf" required />
            <span class="drop-title">拖拽或点击上传 PDF</span>
            <span class="drop-meta" id="file-meta">仅支持单个 .pdf 文件，建议不超过 250MB</span>
          </label>

          <p class="field-error" id="file-error" hidden></p>

          <label class="field">
            <span>目标大小</span>
            <div class="inline-field">
              <input id="targetMB" name="targetMB" type="number" min="0.1" step="0.1" placeholder="例如 20" required />
              <span class="suffix">MB</span>
            </div>
          </label>

          <p class="field-error" id="target-error" hidden></p>

          <div class="action-row">
            <button id="submit-button" type="submit">开始压缩</button>
          </div>
        </form>

        <section class="status-card" id="status-card" hidden>
          <div class="status-header">
            <span id="status-title">准备中</span>
            <span id="status-percent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p id="status-message">等待任务启动</p>
          <dl class="metrics" id="metrics"></dl>
          <div class="action-row" id="download-row" hidden>
            <button id="download-button" type="button">下载压缩文件</button>
          </div>
        </section>

        <section class="pay-card" id="pay-card" hidden>
          <h2>免费次数已用完</h2>
          <p id="pay-message"></p>
          <div id="package-list" class="package-grid"></div>
          <div id="payment-list" class="payment-list"></div>
          <p class="support-copy" id="support-copy"></p>
          <div class="action-row">
            <button id="paid-button" type="button">我已支付，继续本次压缩</button>
          </div>
        </section>
      </section>

      <section class="panel" id="package-panel">
        <div class="dashboard-header">
          <h2>可用套餐</h2>
          <span class="muted-text">1.0 版本为展示套餐 + 人工支付确认</span>
        </div>
        <div class="package-grid" id="homepage-packages"></div>
      </section>

    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div>
          <strong>客服邮箱：</strong>
          <a id="support-email-link" href="mailto:zijinnmengli@gmail.com">zijinnmengli@gmail.com</a>
        </div>
        <nav class="footer-links">
          <a href="/privacy">隐私政策</a>
          <a href="/terms">用户协议</a>
          <a href="/contact">联系我们</a>
          <a href="/faq">常见问题</a>
        </nav>
      </div>
    </footer>

    <script src="/app.js" defer></script>
  </body>
</html>
