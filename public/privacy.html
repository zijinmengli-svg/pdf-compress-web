        <h1>隐私政策</h1>
        <p>您上传的 PDF 文件仅用于本次压缩处理。原始文件与结果文件仅短期保存在服务器临时目录中，到期后自动删除，不做长期存储。</p>
        <p>我们记录必要的访问与功能使用数据，用于统计访问量、压缩成功率、下载情况和异常问题定位，不会将您的 PDF 内容用于本次处理之外的用途。</p>
        <p>如遇文件处理、支付或下载问题，您可以通过客服联系渠道提交问题，我们会根据必要的访问日志协助排查。</p>
      </section>
    </main>
