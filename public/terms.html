<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PDF压缩神器用户协议 - 使用本服务前请仔细阅读。" />
    <meta name="robots" content="noindex, follow" />
    <title>用户协议 - PDF压缩神器</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="content-shell">
      <section class="panel legal-card">
        <h1>用户协议</h1>
        <p>本工具仅提供单个 PDF 文件目标体积压缩服务，不提供合并、拆分、OCR、编辑等其他 PDF 功能。</p>
        <p>用户应确保上传文件合法合规且有权处理。对于加密、损坏或超出系统能力的文件，系统可能无法完成压缩。</p>
        <p>压缩结果会尽量接近您输入的目标大小，但若文件本身压缩空间有限，系统可能返回未完全达到目标的较优结果。</p>
      </section>
    </main>
  </body>
</html>
