<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PDF压缩神器 - 想多大就多大！一键压缩PDF文件到指定大小，保持清晰度，免费在线使用。" />
    <meta name="keywords" content="PDF压缩,压缩PDF,PDF减小大小,PDF在线压缩,免费PDF压缩" />
    <title>PDF压缩神器 - 想多大就多大 | 免费在线PDF压缩工具</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <span class="eyebrow">PDF Compression v1.0.0</span>
      </header>

      <section class="hero">
        <h1>想多大就多大<br />PDF一键压缩神器</h1>
        <p class="lead">
          仅支持电脑网页版、单个 PDF 文件。保持页数、页面尺寸和版式不变，优先保留图片和文字清晰度。
        </p>
      </section>

      <section class="panel">
        <div class="config-row">
          <span class="chip">单文件上限：250MB</span>
          <span class="chip">完全免费</span>
        </div>

        <form id="compress-form" class="form" novalidate>
          <label class="dropzone" id="dropzone" for="pdf">
            <input id="pdf" name="pdf" type="file" accept="application/pdf" required />
            <span class="drop-title">拖拽或点击上传 PDF</span>
            <span class="drop-meta" id="file-meta">仅支持单个 .pdf 文件，建议不超过 250MB</span>
          </label>

          <p class="field-error" id="file-error" hidden></p>

          <label class="field">
            <span>目标大小</span>
            <div class="inline-field">
              <input id="targetMB" name="targetMB" type="number" min="0.1" step="0.1" placeholder="例如 20" required />
              <span class="suffix">MB</span>
            </div>
          </label>

          <p class="field-error" id="target-error" hidden></p>

          <div class="action-row">
            <button id="submit-button" type="submit">开始压缩</button>
          </div>
        </form>

        <section class="status-card" id="status-card" hidden>
          <div class="status-header">
            <span id="status-title">准备中</span>
            <span id="status-percent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p id="status-message">等待任务启动</p>
          <dl class="metrics" id="metrics"></dl>
          <div class="action-row" id="download-row" hidden>
            <button id="download-button" type="button">下载压缩文件</button>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div>
          <strong>客服邮箱：</strong>
          <a href="mailto:zijinnmengli@gmail.com">zijinnmengli@gmail.com</a>
        </div>
      </div>
    </footer>

    <script src="/app-simple.js" defer></script>
  </body>
</html>
